<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dire Wolf | Colecciones</title>
    <link rel="icon" href="img/logo_lobo.png"/>
    <link rel="stylesheet" href="../css.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
<!-- NAV --------------------------------------------------------------------------------------------------------------->
<div id="navbar-catalogo"></div>
<!-- BODY -->
    <div class="container-grandfather">
        <h1 style="text-align: center; color:white">ANTISOCIAL</h1>
        <div class="container-father">
            <div class="img-cal"><img src="../img/anti/1.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/2.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/3.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/4.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/5.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/6.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/7.jpg" class="imagen-zoom"></div>
            <div class="img-cal"><img src="../img/anti/8.jpg" class="imagen-zoom"></div>
        </div>
    </div>
     <!--** Overlay donde se amplía la imagen ---------------------------------------------------------------------------------------->
    <div class="zoom-overlay" id="zoomOverlay">
        <img src="" alt="Imagen ampliada" id="zoomedImg">
        <div class="zoom-buttons">
            <button onclick="cerrarZoom()" class="btn-primary reveal">Cerrar</button>
            <button onclick="descargarImg()" class="btn-primary reveal">Descargar</button>
        </div>
    </div>
    <!-- **SCRIPT DE ZOOM------------------------------------------------------------------------------------------------------------- -->
    <script>
    const miniaturas = document.querySelectorAll('.imagen-zoom');
    const overlay = document.getElementById('zoomOverlay');
    const imagenGrande = document.getElementById('zoomedImg');

    // Clic en cualquier miniatura
    miniaturas.forEach(imagen => {
      imagen.addEventListener('click', () => {
        imagenGrande.src = imagen.src;
        overlay.style.display = 'flex';
      });
    });

    // Cerrar imagen ampliada
    function cerrarZoom() {
        overlay.style.display = 'none';
        imagenGrande.src = '';
    }

    // Descargar imagen
    function descargarImg() {
      const enlace = document.createElement('a');
      enlace.href = imagenGrande.src;
      enlace.download = 'imagen-descargada.jpg';
      enlace.click();
    }
    </script>
<!--TODO:FOOTER ------------------------------------------------------------------------------------------- -->
 <footer id="footer"></footer>
</body>
<script src="../jsjs.js" defer></script>
</html>

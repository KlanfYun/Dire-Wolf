     <!--** Overlay donde se amplía la imagen ---------------------------------------------------------------------------------------->
    <div class="zoom-overlay" id="zoomOverlay">
        <img src="" alt="Imagen ampliada" id="zoomedImg">
        <div class="zoom-buttons">
            <button onclick="cerrarZoom()">Cerrar</button>
            <button onclick="descargarImg()">Descargar</button>
        </div>
    </div>
    <!-- **SCRIPT DE ZOOM------------------------------------------------------------------------------------------------------------- -->
    <script>
    const miniaturas = document.querySelectorAll('.imagen-zoom');
    const overlay = document.getElementById('zoomOverlay');
    const imagenGrande = document.getElementById('zoomedImg');

    // Clic en cualquier miniatura
    miniaturas.forEach(imagen => {
      imagen.addEventListener('click', () => {
        imagenGrande.src = imagen.src;
        overlay.style.display = 'flex';
      });
    });

    // Cerrar imagen ampliada
    function cerrarZoom() {
        overlay.style.display = 'none';
        imagenGrande.src = '';
    }

    // Descargar imagen
    function descargarImg() {
      const enlace = document.createElement('a');
      enlace.href = imagenGrande.src;
      enlace.download = 'imagen-descargada.jpg';
      enlace.click();
    }
    </script>

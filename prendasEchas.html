<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dire Wolf | Prendas listas</title>
    <link rel="stylesheet" href="css.css">
    <link rel="icon" href="img/logo_lobo.png">
    <script src="jsjs.js"></script>
</head>
<!-- NAV -------------------------------------------------------------------------------------------------------------->
<div id="navbar"></div>

<body>
    <div class="container-grandfather">
        <h1 style="text-align: center; color:white">Listas</h1>
        <div class="item-center-x">
            <b id="subtema">Aqui estan las playeras ya sublimadas y de entrega directa</b>
        </div>
        <div class="container-father">
            <div class="imgListas"><img src="img/zPreparadas/1.jpg" class="imagen-zoom">
                <b>Talla: M Stock: 1</b>
                <div class="disponible"><h5>Disponible</h5></div>
            </div>
            <div class="imgListas"><img src="img/zPreparadas/3.jpg" class="imagen-zoom">
                <b>Talla: M Stock: 1</b>
                <div class="disponible"><h5>Disponible</h5></div>
            </div>
        </div>
    </div>
     <!--** Overlay donde se amplía la imagen ---------------------------------------------------------------------------------------->
    <div class="zoom-overlay" id="zoomOverlay">
        <img src="" alt="Imagen ampliada" id="zoomedImg">
        <div class="zoom-buttons">
            <button onclick="cerrarZoom()">Cerrar</button>
            <button onclick="descargarImg()">Descargar</button>
        </div>
    </div>
    <!-- **SCRIPT DE ZOOM------------------------------------------------------------------------------------------------------------- -->
    <script>
    const miniaturas = document.querySelectorAll('.imagen-zoom');
    const overlay = document.getElementById('zoomOverlay');
    const imagenGrande = document.getElementById('zoomedImg');

    // Clic en cualquier miniatura
    miniaturas.forEach(imagen => {
      imagen.addEventListener('click', () => {
        imagenGrande.src = imagen.src;
        overlay.style.display = 'flex';
      });
    });

    // Cerrar imagen ampliada
    function cerrarZoom() {
        overlay.style.display = 'none';
        imagenGrande.src = '';
    }

    // Descargar imagen
    function descargarImg() {
      const enlace = document.createElement('a');
      enlace.href = imagenGrande.src;
      enlace.download = 'imagen-descargada.jpg';
      enlace.click();
    }
    </script>
<!--TODO:FOOTER ------------------------------------------------------------------------------------------- -->
 <footer id="footer"></footer>
</body>
<script src="jsjs.js"></script>
</html>

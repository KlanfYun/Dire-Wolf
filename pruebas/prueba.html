<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo desvanecido</title>
</head>
<style>
  /* Configuración base */
html {
    font-size: 16px; /* Para rem escalables */
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh; /* Altura completa del viewport */
    font-family: Arial, sans-serif;
    /* Estilos base del nav (de tu código anterior) */
}

.nav-fijo {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgba(0, 0, 0, 0.8); /* Semi-transparente para que se vea el fondo desvanecido */
    padding: 1rem;
    box-sizing: border-box;
    z-index: 1000;
    color: white;
}

/* Fondo desvanecido estático (gradiente) */
.fondo-desvanecido {
    /* Gradiente lineal: Desvanecido de azul intenso arriba a transparente abajo */
    background: linear-gradient(to bottom, 
        #bea61a 0%,      /* Azul arriba */
        #0056b3 50%,     /* Azul medio */
        transparent 100% /* Transparente abajo */
    );
    /* Alternativa radial: Desvanecido desde el centro */
    /* background: radial-gradient(circle, #007bff 0%, transparent 70%); */
    /* Posición y tamaño adaptable */
    background-size: cover; /* Cubre todo, adaptable */
    background-position: center; /* Centrado */
    background-repeat: no-repeat; /* No repite */

    /* Animación de fade in suave al cargar (estática, sin JS) */
    animation: fadeIn 2s ease-in-out; /* Desvanecido de opacidad 0 a 1 en 2s */
}

/* Keyframes para animación de fade */
@keyframes fadeIn {
    from {
        opacity: 0; /* Empieza invisible */
        background-position: top; /* Opcional: mueve el gradiente desde arriba */
    }
    to {
        opacity: 1; /* Visible */
        background-position: center; /* Posición final */
    }
}

/* Hover o interacción: Desvanecido adicional en elementos */
main:hover {
    transition: background 0.5s ease; /* Suave cambio */
    background: linear-gradient(to bottom, #ff6b6b 0%, transparent 100%); /* Cambia color al hover */
}

/* Responsive: Ajusta el gradiente en móviles */
@media (max-width: 768px) {
    .fondo-desvanecido {
        /* Gradiente más vertical en pantallas pequeñas */
        background: linear-gradient(to bottom, 
            #007bff 0%, 
            #0056b3 30%, 
            transparent 80% /* Desvanece más rápido */
        );
    }

    .nav-fijo {
        padding: 0.75rem; /* Menos espacio en móviles */
    }
}

</style>
<body class="fondo-desvanecido"> <!-- Clase para aplicar el efecto -->
    <!-- Tu contenido aquí -->
    <main style="padding: 2rem; color: white; text-align: center;">
        <h1>Contenido con fondo desvanecido</h1>
        <p>El fondo se desvanece gradualmente. Prueba redimensionando la ventana.</p>
    </main>

    <!-- Tu nav fijo anterior (opcional, para integrarlo) -->
    <nav class="nav-fijo" id="miNav">
        <div class="nav-logo">
            <img src="img/logo.png" alt="Logo" width="100%">
        </div>
        <ul class="nav-enlaces">
            <li><a href="index.html">Catálogo</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="prendasEchas.html">Listas</a></li>
        </ul>
        <div class="nav-info">
            <b class="Infooo">Info aquí</b>
        </div>
    </nav>

    <!-- Script opcional para fade condicional con JS -->
    <script>
        // Ejemplo: Fade in del fondo al cargar (condicional si es necesario)
        document.addEventListener('DOMContentLoaded', function() {
            const body = document.body;
            const esMovil = window.innerWidth < 768; // Tu condición

            if (esMovil) {
                // Variable con estilos de fade (objeto como en tu pregunta anterior)
                const estilosFadeMovil = {
                    background: 'linear-gradient(to bottom, #007bff 0%, transparent 100%)', // Desvanecido azul a transparente
                    opacity: '0', // Empieza invisible
                    transition: 'opacity 1s ease-in-out' // Transición suave
                };

                // Función para aplicar (como antes)
                function aplicarEstilos(elemento, estilosObj) {
                    for (let prop in estilosObj) {
                        elemento.style[prop] = estilosObj[prop];
                    }
                }

                aplicarEstilos(body, estilosFadeMovil);
                // Fade in después de 0.5s
                setTimeout(() => {
                    body.style.opacity = '1';
                }, 500);
            }
        });
    </script>
</body>
</html>

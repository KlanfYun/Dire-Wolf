<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Animación una sola vez</title>
  <style>
    .img-cata {
      width: 200px;
      height: 200px;
      background: tomato;
      /* Animación al cargar la página */
      animation: aparecer 2s ease-out 1; /* solo una vez */
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="img-cata"></div>
</body>
</html>
